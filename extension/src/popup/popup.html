<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BookSmart</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Login Screen (shown when not authenticated) -->
    <div id="loginScreen" class="screen">
      <div class="login-content">
        <div class="logo">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M19 21H5C3.89543 21 3 20.1046 3 19V5C3 3.89543 3.89543 3 5 3H19C20.1046 3 21 3.89543 21 5V19C21 20.1046 20.1046 21 19 21Z" stroke="#3B82F6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M7 7H17M7 12H17M7 17H13" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <h1>BookSmart</h1>
        <p class="subtitle">AI-powered bookmark management</p>

        <form id="loginForm" class="login-form">
          <input type="email" id="email" placeholder="Email" required autocomplete="email">
          <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
          <button type="submit" class="btn btn-primary">Login</button>
          <div id="loginError" class="error-message hidden"></div>
        </form>

        <div class="login-footer">
          <a href="#" id="registerLink" class="link">Create account</a>
        </div>
      </div>
    </div>

    <!-- Register Screen -->
    <div id="registerScreen" class="screen hidden">
      <div class="login-content">
        <div class="logo">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M19 21H5C3.89543 21 3 20.1046 3 19V5C3 3.89543 3.89543 3 5 3H19C20.1046 3 21 3.89543 21 5V19C21 20.1046 20.1046 21 19 21Z" stroke="#3B82F6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M7 7H17M7 12H17M7 17H13" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <h1>Create Account</h1>
        <p class="subtitle">Join BookSmart</p>

        <form id="registerForm" class="login-form">
          <input type="text" id="registerName" placeholder="Full Name" required autocomplete="name">
          <input type="email" id="registerEmail" placeholder="Email" required autocomplete="email">
          <input type="password" id="registerPassword" placeholder="Password (min 8 characters)" required autocomplete="new-password" minlength="8">
          <button type="submit" class="btn btn-primary">Create Account</button>
          <div id="registerError" class="error-message hidden"></div>
        </form>

        <div class="login-footer">
          <a href="#" id="backToLoginLink" class="link">Back to login</a>
        </div>
      </div>
    </div>

    <!-- Main Screen (shown when authenticated) -->
    <div id="mainScreen" class="screen hidden">
      <!-- Header with Search -->
      <div class="header">
        <div class="search-container">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="11" cy="11" r="8" stroke="#6B7280" stroke-width="2"/>
            <path d="M21 21L16.65 16.65" stroke="#6B7280" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <input type="text" id="searchInput" placeholder="Search bookmarks..." autocomplete="off">
        </div>
      </div>

      <!-- Bookmarks List -->
      <div class="bookmarks-container">
        <div id="bookmarksList" class="bookmarks-list">
          <!-- Bookmarks will be inserted here dynamically -->
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="state-message hidden">
          <div class="spinner"></div>
          <p>Loading bookmarks...</p>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="state-message hidden">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M19 21H5C3.89543 21 3 20.1046 3 19V5C3 3.89543 3.89543 3 5 3H19C20.1046 3 21 3.89543 21 5V19C21 20.1046 20.1046 21 19 21Z" stroke="#D1D5DB" stroke-width="2"/>
            <path d="M12 8V16M8 12H16" stroke="#D1D5DB" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <p>No bookmarks yet</p>
          <p class="hint">Click the star in your address bar to save a bookmark</p>
        </div>
      </div>

      <!-- Footer -->
      <div class="footer">
        <button id="openManagerBtn" class="btn btn-secondary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 6H6C4.89543 6 4 6.89543 4 8V18C4 19.1046 4.89543 20 6 20H16C17.1046 20 18 19.1046 18 18V14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M14 4H20M20 4V10M20 4L10 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Open Manager
        </button>
        <button id="logoutBtn" class="btn btn-text">Logout</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
