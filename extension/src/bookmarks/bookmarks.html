<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BookSmart - Launching Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0b0f19;
      --accent-color: #6366f1;
      --accent-glow: rgba(99, 102, 241, 0.15);
      --card-bg: rgba(17, 24, 39, 0.7);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Ambient background glows */
    .glow-blob {
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--accent-glow) 0%, rgba(99, 102, 241, 0) 70%);
      filter: blur(40px);
      z-index: 1;
      pointer-events: none;
    }

    .glow-1 {
      top: -10%;
      left: -10%;
    }

    .glow-2 {
      bottom: -10%;
      right: -10%;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.12) 0%, rgba(139, 92, 246, 0) 70%);
    }

    /* Content Container */
    .container {
      position: relative;
      z-index: 2;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 3rem 2.5rem;
      border-radius: 24px;
      width: 90%;
      max-width: 440px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }

    /* Glassmorphic Dual Orbit Spinner */
    .spinner-box {
      position: relative;
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .orbit-outer {
      position: absolute;
      width: 100%;
      height: 100%;
      border: 3px solid transparent;
      border-top-color: var(--accent-color);
      border-bottom-color: var(--accent-color);
      border-radius: 50%;
      animation: spin-clockwise 2s cubic-bezier(0.5, 0.1, 0.4, 0.9) infinite;
      box-shadow: 0 0 15px var(--accent-glow);
    }

    .orbit-inner {
      position: absolute;
      width: 70%;
      height: 70%;
      border: 2px solid transparent;
      border-left-color: #8b5cf6;
      border-right-color: #8b5cf6;
      border-radius: 50%;
      animation: spin-counter-clockwise 1.5s cubic-bezier(0.5, 0.1, 0.4, 0.9) infinite;
    }

    .logo-dot {
      width: 12px;
      height: 12px;
      background-color: var(--text-main);
      border-radius: 50%;
      box-shadow: 0 0 8px #ffffff;
      animation: pulse-dot 1.5s ease-in-out infinite alternate;
    }

    /* Text elements */
    .title {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--text-main);
      letter-spacing: -0.025em;
      background: linear-gradient(135deg, #ffffff 40%, #c7d2fe 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }

    .description {
      font-size: 0.95rem;
      color: var(--text-muted);
      line-height: 1.5;
      font-weight: 300;
    }

    /* Redirection button fallback */
    .fallback-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.75rem 1.5rem;
      font-size: 0.85rem;
      font-weight: 600;
      font-family: inherit;
      color: var(--accent-color);
      background-color: rgba(99, 102, 241, 0.08);
      border: 1px solid rgba(99, 102, 241, 0.2);
      border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      margin-top: 0.5rem;
    }

    .fallback-btn:hover {
      background-color: var(--accent-color);
      color: #ffffff;
      border-color: var(--accent-color);
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
      transform: translateY(-2px);
    }

    .fallback-btn:active {
      transform: translateY(0);
    }

    /* Keyframes animations */
    @keyframes spin-clockwise {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes spin-counter-clockwise {
      0% { transform: rotate(360deg); }
      100% { transform: rotate(0deg); }
    }

    @keyframes pulse-dot {
      0% { transform: scale(0.85); opacity: 0.7; }
      100% { transform: scale(1.15); opacity: 1; }
    }
  </style>
</head>
<body>

  <!-- Ambient light blobs -->
  <div class="glow-blob glow-1"></div>
  <div class="glow-blob glow-2"></div>

  <!-- Loading Box -->
  <div class="container">
    <div class="spinner-box">
      <div class="orbit-outer"></div>
      <div class="orbit-inner"></div>
      <div class="logo-dot"></div>
    </div>

    <div>
      <h1 class="title">BookSmart</h1>
      <p class="description">Opening your visual AI bookmark dashboard...</p>
    </div>

    <a id="dashboard-link" href="https://booksmart-manager-920600341451.us-central1.run.app/" class="fallback-btn">
      Launch Dashboard Directly
    </a>
  </div>

  <script>
    // Define the redirect destination dashboard URL
    const TARGET_URL = "https://booksmart-manager-920600341451.us-central1.run.app/";
    
    // Set href dynamically just in case
    document.getElementById('dashboard-link').href = TARGET_URL;

    // Instantly replace URL so the back-button state works perfectly
    setTimeout(() => {
      window.location.replace(TARGET_URL);
    }, 100);
  </script>
</body>
</html>
